name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same ref. Saves
# CI minutes and means the deploy gate only ever waits on the latest run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        # VITE_API_URL is only used at runtime by the app, but it's read
        # at build time too if any code references import.meta.env, so
        # we provide the prod backend URL here to mirror the Vercel build.
        env:
          VITE_API_URL: https://mediconnect-65qh.onrender.com
        run: npm run build

  backend:
    name: Backend (syntax check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Syntax-check every .js under src/
        # node --check parses each file without executing it. Catches
        # typos, unclosed braces and missing-require issues that would
        # otherwise only show up when Render boots.
        run: |
          set -e
          find src -name "*.js" -print0 | xargs -0 -n1 node --check
