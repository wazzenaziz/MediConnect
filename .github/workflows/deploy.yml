name: Deploy

# Only deploys on push to main. PR runs go through CI but not Deploy.
# The `needs: ci` gate means we don't deploy if lint or build failed.
on:
  workflow_run:
    workflows: ['CI']
    branches: [main]
    types: [completed]

# Don't queue deploys. If two pushes land back-to-back, only the latest
# wins — the older deploy is cancelled before it fires.
concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel + Render
    runs-on: ubuntu-latest
    # Only run if the CI workflow that triggered us actually succeeded.
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    steps:
      - name: Echo what we're deploying
        run: |
          echo "Deploying commit ${{ github.event.workflow_run.head_sha }}"
          echo "From branch ${{ github.event.workflow_run.head_branch }}"

      - name: Trigger Render deploy
        # Render's deploy hook is an unauthenticated POST to a per-service
        # URL. The URL itself is the secret — keep it out of source.
        run: |
          response=$(curl -sS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}")
          echo "Render response: $response"

      - name: Trigger Vercel deploy
        # Vercel's deploy hook is the same shape: secret URL, POST, no body.
        run: |
          response=$(curl -sS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")
          echo "Vercel response: $response"

      - name: Summary
        run: |
          echo "### 🚀 Deploy triggered" >> $GITHUB_STEP_SUMMARY
          echo "- Render: https://mediconnect-65qh.onrender.com" >> $GITHUB_STEP_SUMMARY
          echo "- Vercel: https://medi-connect-nine-kappa.vercel.app" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.event.workflow_run.head_sha }}\`" >> $GITHUB_STEP_SUMMARY
